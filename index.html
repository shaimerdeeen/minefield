<!DOCTYPE html>
<html>
<head>
  <script src='https://cdn.plot.ly/plotly-2.26.0.min.js'></script>
</head>
<body style='margin:0;padding:0;background:#0d1117;'>
<div id='plot' style='width:100%;height:100vh;'></div>
<script>
  function toNum(v) {
    return parseFloat(String(v).replace(',', '.'));
  }

  fetch('data.json')
    .then(r => r.json())
    .then(function(data) {

      var lats   = data.map(function(d) { return toNum(d["Широта"]);  });
      var lons   = data.map(function(d) { return toNum(d["Долгота"]); });
      var depths = data.map(function(d) { return toNum(d["Глубина"]); });

      var depthMin = Math.min.apply(null, depths);
      var depthMax = Math.max.apply(null, depths);

      var trace = {
        type: 'scatter3d',
        mode: 'markers',
        x: lons,
        y: lats,
        z: depths,
        marker: {
          size: 2,
          color: depths,
          colorscale: 'Viridis',
          colorbar: {
            title: 'Глубина (м)',
            tickfont: { color: '#ffffff' },
            titlefont: { color: '#ffffff' },
            autorange: 'reversed'
          },
          opacity: 0.85
        }
      };

      var layout = {
        paper_bgcolor: '#0d1117',
        scene: {
          bgcolor: '#0d1117',
          xaxis: { title: 'Долгота', color: '#ffffff' },
          yaxis: { title: 'Широта',  color: '#ffffff' },
          zaxis: {
            title: 'Глубина (м)',
            color: '#ffffff',
            autorange: false,
            range: [depthMin, depthMax]
          }
        },
        margin: { l: 0, r: 0, t: 0, b: 0 },
        font: { color: '#ffffff' }
      };

      Plotly.newPlot('plot', [trace], layout, { responsive: true });
    });
</script>
</body>
</html>
